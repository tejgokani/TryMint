<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>TRYMINT - Secure Package Management Sandbox</title>
    <meta name="description" content="TRYMINT runs npm packages in an isolated sandbox environment, analyzes their behavior, and provides risk scoring before installation. Keep your development environment secure and trustworthy." />
    <meta name="keywords" content="npm, package manager, sandbox, security, risk analysis, package testing" />
    <meta name="author" content="TRYMINT" />
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="TRYMINT - Secure Package Management Sandbox" />
    <meta property="og:description" content="Install packages safely before they touch your system. TRYMINT provides secure sandbox testing for npm packages." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://trymint.io" />
    <meta property="og:image" content="https://trymint.io/og-image.png" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TRYMINT - Secure Package Management Sandbox" />
    <meta name="twitter:description" content="Install packages safely before they touch your system." />
    <meta name="twitter:image" content="https://trymint.io/twitter-image.png" />
    
    <!-- Security Headers (X-Frame-Options must be set via HTTP header, not meta) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0f1a" />
  </head>
